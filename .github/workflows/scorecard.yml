name: OpenSSF Scorecard

# Supply-chain health check (branch protection, pinned actions, SAST
# presence, etc.) — informational, not a required check. Publishes to the
# public Scorecard API so results show up as a badge/dashboard entry.

on:
  branch_protection_rule:
  schedule:
    # Weekly on Monday 07:00 UTC
    - cron: '0 7 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
