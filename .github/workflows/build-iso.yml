name: Trigger Tromso Live ISO Build

# Dispatches a repository_dispatch to hanthor/tromso-iso to trigger the ISO
# build after a successful OCI image build.  The actual ISO build runs in the
# tromso-iso repo using the dakota-iso approach (dmsquash-live, systemd-boot,
# tuna-installer).

on:
  workflow_run:
    workflows: ["Build Tromso (BuildGrid)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-iso-build:
    name: Trigger ISO build in hanthor/tromso-iso
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Dispatch ISO build to hanthor/tromso-iso
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISO_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'hanthor',
              repo: 'tromso-iso',
              event_type: 'oci-image-published',
              client_payload: {
                sha: context.sha,
                ref: context.ref,
                image: 'ghcr.io/hanthor/tromso:latest',
              }
            });
            core.info('Dispatched oci-image-published to hanthor/tromso-iso');
