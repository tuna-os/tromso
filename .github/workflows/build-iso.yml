name: Build and Publish Tromsø Live ISO

on:
  push:
    branches: [main]
    paths:
      - 'tromso/**'
      - 'Justfile'
      - 'iso.justfile'
      - '.github/workflows/build-iso.yml'
  workflow_run:
    # Rebuild the ISO whenever a fresh OCI image lands on GHCR.
    workflows: ["Build Tromso (Multi-Runner)"]
    types: [completed]
    branches: [main, stable]
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Build ISO but skip uploading to R2 (dry run)'
        required: false
        default: false
        type: boolean

concurrency:
  group: tromso-iso-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build Tromsø Live ISO
    runs-on: ${{ vars.ACTIONS_RUNNER_LABEL || 'ubuntu-24.04' }}
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
      id-token: write # cosign keyless signing (Sigstore/Fulcio OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine channel
        id: channel
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [ "$BRANCH" = "stable" ]; then
            echo "name=stable" >> "$GITHUB_OUTPUT"
            echo "payload_tag=stable" >> "$GITHUB_OUTPUT"
            echo "r2_prefix=tromso/stable" >> "$GITHUB_OUTPUT"
          else
            echo "name=nightly" >> "$GITHUB_OUTPUT"
            echo "payload_tag=latest" >> "$GITHUB_OUTPUT"
            echo "r2_prefix=tromso" >> "$GITHUB_OUTPUT"
          fi

      - name: Point ISO payload at channel image
        run: echo "ghcr.io/tuna-os/tromso:${{ steps.channel.outputs.payload_tag }}" > tromso/payload_ref

      - name: Free disk space
        # Must run before Setup Just: tool-cache:true wipes the runner tool
        # cache, which deletes the just binary setup-just just installed.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Expose just to sudo/root
        # Recipes call `just` recursively and run under sudo; root's
        # secure_path won't see the runner tool cache.
        run: sudo ln -sf "$(command -v just)" /usr/local/bin/just

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y podman buildah rclone mtools xorriso skopeo

      - name: Log in to GHCR
        run: echo "$GITHUB_TOKEN" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Live ISO
        run: |
          df -h /
          sudo mkdir -p /var/iso-build
          sudo "$(command -v just)" installer_channel=stable output_dir=/var/iso-build iso-sd-boot tromso
          mkdir -p output
          sudo cp /var/iso-build/*.iso output/ 2>/dev/null || true
          sudo chown -R "$USER:$(id -gn)" output/

      - name: Compute ISO name
        id: iso
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "dated=tromso-live-${DATE}-${SHA}.iso" >> "$GITHUB_OUTPUT"
          echo "path=output/tromso-live.iso" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          sha256sum "$ISO" | sed "s|${ISO}|${DATED}|" | tee "output/${DATED}-CHECKSUM"
          sha256sum "$ISO" | sed "s|${ISO}|tromso-live-latest.iso|" > "output/tromso-live-latest.iso-CHECKSUM"
          echo "path=output/${DATED}-CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "name=${DATED}-CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: ${{ inputs.skip_upload != true && github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign ISO (cosign keyless)
        id: sign
        if: ${{ inputs.skip_upload != true && github.event_name != 'pull_request' }}
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          cosign sign-blob --yes \
            --output-signature "${ISO}.sig" \
            --output-certificate "${ISO}.cert" \
            "$ISO"
          echo "sig_path=${ISO}.sig" >> "$GITHUB_OUTPUT"
          echo "cert_path=${ISO}.cert" >> "$GITHUB_OUTPUT"

      - name: Upload ISO to Cloudflare R2
        if: ${{ inputs.skip_upload != true && github.event_name != 'pull_request' }}
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          DATED="${{ steps.iso.outputs.dated }}"
          rclone copyto --log-level INFO --checksum --s3-no-check-bucket "$ISO" "R2:${R2_BUCKET}/${{ steps.channel.outputs.r2_prefix }}/${DATED}"
          rclone copyto --log-level INFO --s3-no-check-bucket "$ISO" "R2:${R2_BUCKET}/${{ steps.channel.outputs.r2_prefix }}/tromso-live-latest.iso"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.checksum.outputs.path }}" "R2:${R2_BUCKET}/${{ steps.channel.outputs.r2_prefix }}/${{ steps.checksum.outputs.name }}"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.sign.outputs.sig_path }}" "R2:${R2_BUCKET}/${{ steps.channel.outputs.r2_prefix }}/${DATED}.sig"
          rclone copyto --log-level INFO --s3-no-check-bucket \
            "${{ steps.sign.outputs.cert_path }}" "R2:${R2_BUCKET}/${{ steps.channel.outputs.r2_prefix }}/${DATED}.cert"
          echo "https://download.tunaos.org/tromso/tromso-live-latest.iso"
        continue-on-error: true

      - name: Boot verification (UEFI + serial)
        timeout-minutes: 10
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick -qq
          EFI_CODE=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd /usr/share/edk2/ovmf/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd /usr/share/edk2/ovmf/OVMF_VARS.fd; do
            if [ -f "$f" ]; then cp "$f" /tmp/EFI_VARS.fd; break; fi
          done
          PFLASH=()
          [ -n "$EFI_CODE" ] && [ -f /tmp/EFI_VARS.fd ] && \
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE" \
                     -drive "if=pflash,format=raw,file=/tmp/EFI_VARS.fd")
          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm -cpu host -m 4G -smp 2 \
            "${PFLASH[@]}" -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log -display none -daemonize
          for i in $(seq 1 30); do [ -S /tmp/qemu-monitor.sock ] && break; sleep 2; done
          for i in $(seq 1 60); do
            sudo grep -q "TROMSO_LIVE_READY" /tmp/serial.log 2>/dev/null && { echo "==> Ready after $((i*5))s"; break; }
            [ "$i" -eq 60 ] && echo "WARNING: ready token not seen after 5m" || true
            sleep 5
          done
          echo "screendump /tmp/screenshot.ppm" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          sudo test -f /tmp/screenshot.ppm && \
            { sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || sudo cp /tmp/screenshot.ppm screenshot.png; }
          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sudo grep -qE "TROMSO_LIVE_READY|Finished live-ready\.service" /tmp/serial.log || \
            { echo "ERROR: Live environment did not reach ready state"; sudo tail -50 /tmp/serial.log; exit 1; }

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.iso.outputs.dated }}
          path: ${{ steps.iso.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload checksum as artifact
        uses: actions/upload-artifact@v7
        with:
          name: checksum-${{ steps.iso.outputs.dated }}
          path: ${{ steps.checksum.outputs.path }}
          if-no-files-found: warn
          retention-days: 7

      - name: Upload boot screenshot as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: boot-screenshot-tromso
          path: screenshot.png
          if-no-files-found: warn
          retention-days: 7
