name: Lint

# Runs shellcheck and yamllint on PRs and pushes to main.
# Minimum guardrail to catch script errors before they break builds.
# Added by quality agent — addresses tuna-os/tromso#37

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: >
            tromso/src/build-iso.sh
            tromso/src/configure-live.sh
            tromso/src/install-flatpaks.sh
          severity: error
          # files/ is kde-build-meta-derived: dracut module fragments and
          # profile.d snippets meant to be sourced, not executed — they
          # intentionally have no shebang (SC2148 doesn't apply to them).
          ignore_paths: files

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              comments-indentation: disable
              braces:
                level: warning
                max-spaces-inside: 1
              brackets:
                level: warning
                max-spaces-inside: 1

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint on workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  renovate-config:
    name: Renovate Config Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate renovate.json
        run: npx --yes --package renovate -- renovate-config-validator renovate.json
