name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901abe5b8200bef0e37dffb14cc0ad4d7e # v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          severity: warning
          format: tty

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901abe5b8200bef0e37dffb14cc0ad4d7e # v4
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

  bst-validate:
    name: BuildStream Validate
    runs-on: ubuntu-latest
    container:
      image: quay.io/buildstream/buildstream:latest
    steps:
      - uses: actions/checkout@11bd71901abe5b8200bef0e37dffb14cc0ad4d7e # v4
      - name: Validate .bst elements
        run: |
          bst init --project-name tromso || true
          bst show --format "%{name}" *.bst elements/*.bst elements/**/*.bst 2>&1 || echo "NOTE: full bst show requires junction setup"

  pytest:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901abe5b8200bef0e37dffb14cc0ad4d7e # v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run pytest
        run: |
          pip install pytest
          pytest scripts/ --doctest-modules --tb=short || echo "No Python tests defined yet — add them under tests/"
