name: Build Tromso (Multi-Runner)

# Splits the BuildStream build into parallel chunks across free GitHub
# runners, sharing CAS state between jobs via GHCR-hosted tarballs.

on:
  push:
    branches: [main, stable]
    paths:
      - 'elements/**'
      - 'project.conf'
      - 'include/**'
      - 'buildstream-ci.conf'
      - 'scripts/ci-build-matrix.py'
      - '.github/workflows/build-tromso-multirunner.yml'
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push OCI image to GHCR'
        type: boolean
        default: true
      num_chunks:
        description: 'Number of parallel dependency chunks'
        type: string
        default: '10'

env:
  IMAGE_NAME: tromso
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  BST_TARGET: oci/tromso.bst
  BST2_IMAGE: registry.gitlab.com/freedesktop-sdk/infrastructure/freedesktop-sdk-docker-images/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d
  NUM_CHUNKS: ${{ inputs.num_chunks || '10' }}
  CORE_SPLIT: "200"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Long builds must never be cancelled by the next schedule/push — queue instead.
  cancel-in-progress: false

jobs:
  # ── Phase 1: Plan ────────────────────────────────────────────────────
  planning:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    outputs:
      matrix_keys: ${{ steps.matrix.outputs.matrix_keys }}
      matrix_data: ${{ steps.matrix.outputs.matrix_data }}
      cache_keys: ${{ steps.matrix.outputs.cache_keys }}
      core_targets: ${{ steps.matrix.outputs.core_targets }}
      final_target: ${{ steps.matrix.outputs.final_target }}
    steps:
      - uses: actions/checkout@v7

      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Cache BuildStream sources
        uses: actions/cache@v6
        with:
          path: .cache/buildstream/sources
          key: bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: |
            bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-

      - name: Generate Build Matrix
        id: matrix
        env:
          BST_FLAGS: --no-interactive
        run: |
          mkdir -p .cache/buildstream logs

          podman run --rm --privileged --device /dev/fuse \
            --security-opt apparmor=unconfined --cap-add SYS_ADMIN \
            -v "${{ github.workspace }}:/src:rw" \
            -v "${{ github.workspace }}/.cache/buildstream:/root/.cache/buildstream:rw" \
            -w /src \
            "$BST2_IMAGE" \
            python3 /src/scripts/ci-build-matrix.py "$BST_TARGET" \
              "$NUM_CHUNKS" "$CORE_SPLIT" > matrix.json

          cat matrix.json

          python3 -c "
          import json
          data = json.load(open('matrix.json'))
          keys = list(data['matrix'].keys())
          print(f'matrix_keys={json.dumps(keys)}')
          print(f'matrix_data={json.dumps(data[\"matrix\"])}')
          print(f'cache_keys={json.dumps(data.get(\"cache_keys\", {}))}')
          print(f'core_targets={data.get(\"core\", \"\")}')
          print(f'final_target={data[\"final\"]}')
          " >> "$GITHUB_OUTPUT"

  # ── Phase 2: Core (bootstrap) elements ──────────────────────────────
  build_core:
    needs: planning
    if: needs.planning.outputs.core_targets != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
    env:
      TARGETS: ${{ needs.planning.outputs.core_targets }}
    steps:
      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@v9
        continue-on-error: true

      - uses: actions/checkout@v7
      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Cache BuildStream sources
        uses: actions/cache@v6
        with:
          path: .cache/buildstream/sources
          key: bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: |
            bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-

      - name: Login to GHCR
        run: echo "$GITHUB_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Core Cache from GHCR
        run: |
          mkdir -p ~/.cache/buildstream
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CORE_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest"
          if oras pull "$CORE_REF" -o .; then
            if [ -f cas-core.tar.zst ]; then
              zstd -d -T0 cas-core.tar.zst -o cas-core.tar
              tar -xf cas-core.tar -C "$HOME/.cache/buildstream"
              rm -f cas-core.tar cas-core.tar.zst
            fi
          else
            echo "No existing ${IMAGE_NAME} core cache, starting fresh."
          fi

      - name: Build Core
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: |
          mkdir -p logs
          # Bounded well inside the job timeout so the CAS push below always
          # runs — a job-level timeout cancels the job and throws away the
          # entire build.
          timeout 270m just bst --log-file /src/logs/build-core.log build $TARGETS

      - name: Archive and Push Core CAS
        if: always()
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CORE_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest"
          podman run --rm \
            -v "$HOME/.cache/buildstream:/input:ro" \
            -v "${{ github.workspace }}:/output:rw" \
            "$BST2_IMAGE" \
            sh -c "tar -cf /output/cas-core.tar -C /input --exclude 'cas/staging' --exclude 'cas/tmp' . || [ \$? -eq 1 ]"
          zstd -T0 --rm cas-core.tar -o cas-core.tar.zst
          oras push "$CORE_REF" cas-core.tar.zst:application/vnd.buildstream.cas.tar.zst

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-logs-${{ env.IMAGE_NAME }}-core
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

  # ── Phase 3: Dependency chunks (parallel) ───────────────────────────
  build_deps:
    needs: [planning, build_core]
    if: always() && !contains(needs.*.result, 'failure') && needs.planning.outputs.matrix_keys != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.planning.outputs.matrix_keys) }}
    env:
      TARGETS: ${{ fromJson(needs.planning.outputs.matrix_data)[matrix.chunk] }}
      CHUNK_CACHE_KEY: ${{ fromJson(needs.planning.outputs.cache_keys)[matrix.chunk] }}
    name: Build ${{ matrix.chunk }}
    steps:
      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@v9
        continue-on-error: true

      - uses: actions/checkout@v7
      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Cache BuildStream sources
        uses: actions/cache@v6
        with:
          path: .cache/buildstream/sources
          key: bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: |
            bst-sources-${{ env.IMAGE_NAME }}-${{ runner.os }}-

      - name: Login to GHCR
        run: echo "$GITHUB_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check GHCR for cached chunk
        id: cache_check
        if: env.CHUNK_CACHE_KEY != '' && env.CHUNK_CACHE_KEY != 'null'
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          CHUNK_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:${CHUNK_CACHE_KEY}"
          if oras manifest fetch "$CHUNK_REF" > /dev/null 2>&1; then
            echo "cache_hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache_hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Core Cache
        if: steps.cache_check.outputs.cache_hit != 'true'
        run: |
          mkdir -p ~/.cache/buildstream
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest" -o .; then
            if [ -f cas-core.tar.zst ]; then
              zstd -d -T0 cas-core.tar.zst -o cas-core.tar
              tar -xf cas-core.tar -C "$HOME/.cache/buildstream"
              rm -f cas-core.tar cas-core.tar.zst
            fi
          fi

      - name: Restore Chunk Cache (fallback to latest)
        if: steps.cache_check.outputs.cache_hit != 'true'
        continue-on-error: true
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          LATEST_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:latest"
          if oras pull "$LATEST_REF" -o .; then
            if [ -f cas-${{ matrix.chunk }}.tar.zst ]; then
              mkdir -p ~/.cache/buildstream
              zstd -d -T0 cas-${{ matrix.chunk }}.tar.zst -o cas-${{ matrix.chunk }}.tar
              tar -xf cas-${{ matrix.chunk }}.tar -C "$HOME/.cache/buildstream"
              rm -f cas-${{ matrix.chunk }}.tar cas-${{ matrix.chunk }}.tar.zst
            fi
          fi

      - name: Build Chunk
        id: build
        if: steps.cache_check.outputs.cache_hit != 'true'
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: |
          [ -z "$TARGETS" ] && { echo "skipped=true" >> "$GITHUB_OUTPUT"; exit 0; }
          mkdir -p ~/.cache/buildstream logs
          # Bounded well inside the job timeout so the salvage push below
          # always runs (a job-level timeout cancels the job and loses ~6h of
          # work; this burned hundreds of runner-hours before 2026-07-19).
          # No retry wrapper: buildstream-ci.conf already sets retry-failed
          # and network-retries, and the old loop returned 0 on total failure,
          # which would have published a bogus exact-key cache tag.
          rc=0
          timeout 270m just bst --log-file /src/logs/build-${{ matrix.chunk }}.log build $TARGETS || rc=$?
          [ "$rc" -eq 124 ] && echo "::warning::chunk hit the 270m build budget — partial CAS will be salvaged"
          exit $rc

      - name: Push Chunk CAS to GHCR
        if: always() && steps.cache_check.outputs.cache_hit != 'true' && steps.build.outputs.skipped != 'true' && env.CHUNK_CACHE_KEY != '' && env.CHUNK_CACHE_KEY != 'null'
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          LATEST_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:latest"
          CHUNK_REF="ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${{ matrix.chunk }}:${CHUNK_CACHE_KEY}"
          podman run --rm \
            -v "$HOME/.cache/buildstream:/input:ro" \
            -v "${{ github.workspace }}:/output:rw" \
            "$BST2_IMAGE" \
            sh -c "tar -cf /output/cas-${{ matrix.chunk }}.tar -C /input --exclude 'cas/staging' --exclude 'cas/tmp' . || [ \$? -eq 1 ]"
          zstd -T0 --rm cas-${{ matrix.chunk }}.tar -o cas-${{ matrix.chunk }}.tar.zst
          oras push "$LATEST_REF" cas-${{ matrix.chunk }}.tar.zst:application/vnd.buildstream.cas.tar.zst
          [ "${{ steps.build.outcome }}" == "success" ] && \
            oras push "$CHUNK_REF" cas-${{ matrix.chunk }}.tar.zst:application/vnd.buildstream.cas.tar.zst || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-logs-${{ env.IMAGE_NAME }}-${{ matrix.chunk }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

  # ── Phase 4: Final assembly + push ──────────────────────────────────
  build_final:
    needs: [planning, build_deps]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing (Sigstore/Fulcio OIDC)
      security-events: write # Trivy SARIF upload
    steps:
      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@v9
        continue-on-error: true

      - uses: actions/checkout@v7

      - name: Checkout chunkah
        uses: actions/checkout@v7
        with:
          repository: coreos/chunkah
          path: chunkah

      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Login to GHCR
        run: echo "$GITHUB_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and Merge CAS Chunks
        env:
          MATRIX_KEYS: ${{ needs.planning.outputs.matrix_keys }}
          CACHE_KEYS: ${{ needs.planning.outputs.cache_keys }}
        run: |
          mkdir -p ~/.cache/buildstream
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          if oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest" -o .; then
            if [ -f cas-core.tar.zst ]; then
              zstd -d -T0 cas-core.tar.zst -o cas-core.tar
              tar -xf cas-core.tar -C "$HOME/.cache/buildstream"
              rm -f cas-core.tar cas-core.tar.zst
            fi
          fi

          echo "$MATRIX_KEYS" | jq -r '.[]' | while read -r chunk; do
            CACHE_KEY=$(echo "$CACHE_KEYS" | jq -r --arg c "$chunk" '.[$c] // empty')
            PULLED=false
            if [ -n "$CACHE_KEY" ]; then
              if oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${chunk}:${CACHE_KEY}" -o .; then
                PULLED=true
              fi
            fi
            if [ "$PULLED" = "false" ]; then
              oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${chunk}:latest" -o . || continue
            fi
            TARBALL="cas-${chunk}.tar.zst"
            if [ -f "$TARBALL" ]; then
              zstd -d -T0 "$TARBALL" -o "cas-${chunk}.tar"
              tar -xf "cas-${chunk}.tar" -C "$HOME/.cache/buildstream"
              rm -f "$TARBALL" "cas-${chunk}.tar"
            fi
          done
          du -sh ~/.cache/buildstream

      - name: Build Final Target
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: |
          mkdir -p logs
          timeout 300m just bst --log-file /src/logs/build-final.log build ${{ needs.planning.outputs.final_target }}

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Export OCI image
        id: export
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_REVISION: ${{ github.sha }}
          OCI_IMAGE_VERSION: latest
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
        run: |
          just export
          echo "image_ref=${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Verify + lint
        run: |
          sudo podman images
          just lint

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: final-logs-${{ env.IMAGE_NAME }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Login to GHCR (podman)
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        run: |
          echo "$GITHUB_TOKEN" | \
            sudo podman login ghcr.io --username ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        id: push
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          # Channels: main = nightly trunk (also owns :latest); stable = release bookmark
          if [ "${{ github.ref }}" = "refs/heads/stable" ]; then
            TAGS="stable stable-${DATE_TAG} ${{ github.sha }}"
          else
            TAGS="latest nightly nightly-${DATE_TAG} ${{ github.sha }}"
          fi
          for tag in $TAGS; do
            sudo podman tag "localhost/${{ steps.export.outputs.image_ref }}" \
              "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
            for i in 1 2 3; do
              sudo podman push "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}" && break
              echo "Retry $i..."; sleep 5
            done
          done
          digest=$(sudo podman inspect "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --format '{{.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image (cosign keyless)
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"

      - name: Trivy image scan
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: \`${BST_TARGET}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE_REGISTRY}/${IMAGE_NAME}:latest\`" >> $GITHUB_STEP_SUMMARY
