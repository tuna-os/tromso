name: Build Tromso (Multi-Runner)

# Planning + core + parallel dependency chunks are a shared reusable
# workflow (tuna-os/bst-ci) — identical across every BuildStream desktop
# repo except image name/target/chunk count. build_final (export, sign,
# push) stays here: cosign's keyless signing embeds *this* workflow's
# identity in the Fulcio certificate, which is what README.md's verify
# instructions point at.

on:
  # No push trigger: this build takes hours and we don't need a fresh run
  # on every commit — the daily schedule is enough. Use workflow_dispatch
  # to build on demand.
  schedule:
    # Daily at 00:30 UTC (6:00 AM IST) — early morning, 1h after xfce-linux's
    # slot to reduce org-wide runner contention (tuna-os/tromso#93).
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push OCI image to GHCR'
        type: boolean
        default: true
      num_chunks:
        description: 'Number of parallel dependency chunks'
        type: string
        default: '10'

env:
  IMAGE_NAME: tromso
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  BST_TARGET: oci/tromso.bst
  BST2_IMAGE: registry.gitlab.com/freedesktop-sdk/infrastructure/freedesktop-sdk-docker-images/bst2:64eb0b4930d57a92710822898fb73af6cc1ae35d

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # This build regularly takes multiple hours; main gets pushed to several
  # times a day. cancel-in-progress:true meant every push evicted whatever
  # build was in flight, so the pipeline effectively never completed (#122).
  # Queue instead: the next run just picks up the latest HEAD when its turn
  # comes, rather than restarting from scratch on every intervening push.
  cancel-in-progress: false

jobs:
  # ── Phase 1-3: Plan, core, parallel dependency chunks ────────────────
  multirunner:
    uses: tuna-os/bst-ci/.github/workflows/multirunner-build.yml@main
    permissions:
      contents: read
      packages: write
    with:
      image_name: tromso
      bst_target: oci/tromso.bst
      num_chunks: ${{ inputs.num_chunks || '10' }}
      core_split: "200"

  # ── Phase 4: Final assembly + push ──────────────────────────────────
  build_final:
    needs: multirunner
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing (Sigstore/Fulcio OIDC)
      security-events: write # Trivy SARIF upload
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - uses: actions/checkout@v7

      - name: Checkout chunkah
        uses: actions/checkout@v7
        with:
          repository: coreos/chunkah
          path: chunkah

      - run: podman pull "$BST2_IMAGE"

      - name: Setup Just
        uses: extractions/setup-just@v4

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Login to GHCR
        run: echo "$GITHUB_TOKEN" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and Merge CAS Chunks
        env:
          MATRIX_KEYS: ${{ needs.multirunner.outputs.matrix_keys }}
          CACHE_KEYS: ${{ needs.multirunner.outputs.cache_keys }}
        run: |
          mkdir -p ~/.cache/buildstream
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          if oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-core:latest" -o .; then
            if [ -f cas-core.tar.zst ]; then
              zstd -d -c -T0 cas-core.tar.zst | tar -xf - -C "$HOME/.cache/buildstream"
              rm -f cas-core.tar.zst
            fi
          fi

          echo "$MATRIX_KEYS" | jq -r '.[]' | while read -r chunk; do
            CACHE_KEY=$(echo "$CACHE_KEYS" | jq -r --arg c "$chunk" '.[$c] // empty')
            PULLED=false
            if [ -n "$CACHE_KEY" ]; then
              if oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${chunk}:${CACHE_KEY}" -o .; then
                PULLED=true
              fi
            fi
            if [ "$PULLED" = "false" ]; then
              oras pull "ghcr.io/${REPO_LOWER}/cache-${IMAGE_NAME}-${chunk}:latest" -o . || continue
            fi
            TARBALL="cas-${chunk}.tar.zst"
            if [ -f "$TARBALL" ]; then
              zstd -d -c -T0 "$TARBALL" | tar -xf - -C "$HOME/.cache/buildstream"
              rm -f "$TARBALL"
            fi
          done
          du -sh ~/.cache/buildstream

      - name: Build Final Target
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: |
          mkdir -p logs
          timeout 300m just bst --log-file /src/logs/build-final.log build ${{ needs.multirunner.outputs.final_target }}

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Export OCI image
        id: export
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_REVISION: ${{ github.sha }}
          OCI_IMAGE_VERSION: latest
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
        run: |
          just export
          echo "image_ref=${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Verify + lint
        run: |
          sudo podman images
          just lint

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: final-logs-${{ env.IMAGE_NAME }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Login to GHCR (podman)
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        run: |
          echo "$GITHUB_TOKEN" | \
            sudo podman login ghcr.io --username ${{ github.actor }} --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        id: push
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        run: |
          DATE_TAG=$(date -u +%Y%m%d)
          # Channels: main = nightly trunk (also owns :latest); stable = release bookmark
          if [ "${{ github.ref }}" = "refs/heads/stable" ]; then
            TAGS="stable stable-${DATE_TAG} ${{ github.sha }}"
          else
            TAGS="latest nightly nightly-${DATE_TAG} ${{ github.sha }}"
          fi
          for tag in $TAGS; do
            sudo podman tag "localhost/${{ steps.export.outputs.image_ref }}" \
              "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
            for i in 1 2 3; do
              sudo podman push "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}" && break
              echo "Retry $i..."; sleep 5
            done
          done
          digest=$(sudo podman inspect "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --format '{{.Digest}}')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (cosign keyless)
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        run: |
          cosign sign --yes \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"

      - name: Trivy image scan
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable') && inputs.push_image != false }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: \`${BST_TARGET}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE_REGISTRY}/${IMAGE_NAME}:latest\`" >> $GITHUB_STEP_SUMMARY
