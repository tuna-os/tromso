name: Validate ISO on kanpur (KVM)

# Boots the published live ISO in a real KVM VM on the kanpur self-hosted
# runner (labels: self-hosted, kanpur, vm). Validation only — kanpur is a
# laptop on slow wifi and must never run BuildStream or ISO builds; the ISO
# is fetched from the R2 CDN with a cached, time-conditional download.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Which channel ISO to validate'
        type: choice
        default: nightly
        options: [nightly, stable]
  schedule:
    # Weekly on Wednesday 10:00 UTC
    - cron: '0 10 * * 3'

concurrency:
  group: kanpur-validate
  cancel-in-progress: false

jobs:
  boot-validate:
    runs-on: [self-hosted, kanpur, vm]
    timeout-minutes: 90
    steps:
      - name: Install tools
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 ovmf socat imagemagick curl

      - name: Fetch ISO (cached, conditional)
        id: fetch
        run: |
          CHANNEL="${{ inputs.channel || 'nightly' }}"
          PREFIX="tromso"
          [ "$CHANNEL" = "stable" ] && PREFIX="tromso/stable"
          URL="https://download.tunaos.org/${PREFIX}/tromso-live-latest.iso"
          mkdir -p /work/iso-cache
          ISO="/work/iso-cache/tromso-${CHANNEL}.iso"
          # -z: only re-download when the CDN copy is newer than the cache
          curl -fSL --retry 3 -o "$ISO" ${ISO:+-z "$ISO"} "$URL"
          curl -fSL --retry 3 -o "${ISO}.sig" "${URL}.sig"
          curl -fSL --retry 3 -o "${ISO}.cert" "${URL}.cert"
          ls -lh "$ISO"
          echo "iso=$ISO" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Verify ISO signature (#86)
        run: |
          ISO="${{ steps.fetch.outputs.iso }}"
          cosign verify-blob "$ISO" \
            --certificate "${ISO}.cert" \
            --signature "${ISO}.sig" \
            --certificate-identity-regexp 'https://github.com/tuna-os/tromso/\.github/workflows/build-iso\.yml@.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Boot verification (UEFI + KVM + serial)
        timeout-minutes: 20
        run: |
          ISO="${{ steps.fetch.outputs.iso }}"
          EFI_CODE=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do
            [ -f "$f" ] && cp "$f" /tmp/EFI_VARS.fd && break
          done
          rm -f /tmp/serial.log /tmp/qemu-monitor.sock
          qemu-system-x86_64 \
            -machine type=q35,accel=kvm -cpu host -m 4G -smp 2 \
            -drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE" \
            -drive "if=pflash,format=raw,file=/tmp/EFI_VARS.fd" \
            -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log -display none -daemonize
          for i in $(seq 1 30); do [ -S /tmp/qemu-monitor.sock ] && break; sleep 2; done
          for i in $(seq 1 90); do
            grep -q "TROMSO_LIVE_READY" /tmp/serial.log 2>/dev/null && { echo "==> Ready after $((i*5))s"; break; }
            sleep 5
          done
          echo "screendump /tmp/screenshot.ppm" | socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          [ -f /tmp/screenshot.ppm ] && convert /tmp/screenshot.ppm screenshot.png || true
          echo "quit" | socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          grep -qE "TROMSO_LIVE_READY|Finished live-ready\.service" /tmp/serial.log || \
            { echo "ERROR: live environment not ready"; tail -50 /tmp/serial.log; exit 1; }

      - name: Upload screenshot + serial log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kanpur-validate-${{ inputs.channel || 'nightly' }}
          path: |
            screenshot.png
            /tmp/serial.log
          if-no-files-found: warn
          retention-days: 14
