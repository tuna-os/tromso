name: tromso
min-version: "2.5"
element-path: elements

artifacts:
- url: https://cache.freedesktop-sdk.io:11001

(@):
  - freedesktop-sdk.bst:include/runtime.yml
  - include/aliases.yml

options:
  arch:
    type: arch
    description: Machine architecture
    variable: arch
    values:
      - aarch64
      - x86_64
  # From kde-build-meta's own project.conf — referenced by moved elements
  # (freedesktop-sdk.bst's x86_64_v3 conditional, core/gnome-disk-utility.bst's
  # channel conditional).
  toolbox:
    type: bool
    default: false
    description: mount host resources similar to toolbox
  x86_64_v3:
    type: bool
    description: Enable x86_64-v3 (EXPERIMENTAL)
    default: false
  channel:
    type: enum
    description: Version channel of the OS
    default: nightly
    values:
      - nightly
      - stable

sandbox:
  build-arch: "%{arch}"

# kde-build-meta was consolidated directly into this repo (no more junction —
# see elements/kde, elements/kde-linux-deps, elements/kde-linux-system,
# elements/core-deps, elements/core, elements/oci/{integration,initramfs,platform},
# elements/freedesktop-sdk.bst, patches/, files/, keys/, plugins/). The
# settings below (sources:, elements:, split-rules:, environment:, and most
# of variables:) are merged in from kde-build-meta's own project.conf — the
# moved elements depend on them and previously got them from kde-build-meta's
# own project scope. tromso's own branch/arch settings are kept as-is.
sources:
  git_repo:
    config:
      ref-format: git-describe
  cargo2:
    config:
      url: crates:crates
      git-mirrors:
        https://github.com/: "github:"
        https://gitlab.gnome.org/GNOME/: "gnome:"

split-rules:
  devel:
    (>):
    - '%{indep-libdir}/**/include'
    - '%{indep-libdir}/**/include/**'
    - '%{bindir}/*-config'
    - '%{libdir}/cmake'
    - '%{libdir}/cmake/**'
    - '%{datadir}/cmake'
    - '%{datadir}/cmake/**'
    - '%{datadir}/gir-1.0'
    - '%{datadir}/gir-1.0/**'
    - '%{datadir}/vala*/vapi'
    - '%{datadir}/vala*/vapi/**'
    - '%{datadir}/installed-tests'
    - '%{datadir}/installed-tests/**'
    - '%{libexecdir}/installed-tests'
    - '%{libexecdir}/installed-tests/**'
  doc:
    (>):
    - '%{datadir}/gtk-doc/html'
    - '%{datadir}/gtk-doc/html/**'
  source:
  - '%{sourcedir}'
  - '%{sourcedir}/**'
  vm:
  - '%{datadir}/dbus-1/**'

environment:
  LC_ALL: en_US.UTF-8
  LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu:/usr/lib
  (?):
  - arch == "aarch64":
      # See kde-build-meta's own history: CI runner page-size workaround for
      # WebKit builds; kept in case any moved element still needs it.
      JavaScriptCoreUseJIT: '0'
      Malloc: '1'
  - arch == "riscv64":
      G_SLICE: always-malloc

variables:
  branch: main
  installer-volume-id: "tromso-%{arch}"
  qualifier: ''
  runstatedir: "/run"
  efi-arch: ''
  (?):
  - arch == "x86_64":
      go-arch: "amd64"
      systemd-arch: "x86-64"
      efi-arch: x64
  - arch == "aarch64":
      go-arch: "arm64"
      systemd-arch: "arm64"
      efi-arch: aa64

elements:
  autotools:
    variables:
      conf-global: >-
        --disable-static
        --disable-Werror
        --host=%{triplet}
        --build=%{triplet}
        --disable-dependency-tracking
      remove-libtool-modules: true
      remove-libtool-libraries: true

  cmake:
    variables:
      cmake-global: >-
        -DCMAKE_BUILD_TYPE=RelWithDebInfo
        -DCMAKE_C_FLAGS_RELWITHDEBINFO="-DNDEBUG"
        -DCMAKE_CXX_FLAGS_RELWITHDEBINFO="-DNDEBUG"
        -DCMAKE_INSTALL_LIBDIR=%{libdir}
      generator: Ninja
      make-install: env DESTDIR="%{install-root}" cmake --install %{build-dir}

  meson:
    variables:
      meson-global: --buildtype=plain --auto-features=enabled --wrap-mode=nodownload

  filter:
    config:
      include-orphans: true

  cargo:
    config:
      install-commands:
        (>):
        - "%{install-extra}"

plugins:
- origin: junction
  # Standalone (not nested inside a kde-build-meta.bst junction, which no
  # longer exists — kde-build-meta was folded directly into this repo).
  junction: plugins/buildstream-plugins.bst
  elements:
    - autotools
    - meson
    - cmake
    - make
  sources:
    - patch
    - git

- origin: junction
  junction: plugins/buildstream-plugins-community.bst
  elements:
    - collect_integration
    - collect_manifest
    - flatpak_image
    - flatpak_repo
    - ostree
    - pyproject
  sources:
    - cargo2
    - gen_cargo_lock
    - git_module
    - git_repo
    - go_module
    - patch_queue
    - pypi
    - zip

- origin: local
  path: plugins
  elements:
    - collect_initial_scripts
    - cargo
