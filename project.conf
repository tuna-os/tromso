name: tromso
min-version: "2.5"
element-path: elements

artifacts:
- url: https://cache.freedesktop-sdk.io:11001

(@):
  - kde-build-meta.bst:freedesktop-sdk.bst:include/runtime.yml
  - include/aliases.yml

options:
  arch:
    type: arch
    description: Machine architecture
    variable: arch
    values:
      - aarch64
      - x86_64

sandbox:
  build-arch: "%{arch}"

variables:
  branch: main

# Our standalone plugins/buildstream-plugins{,-community}.bst junctions
# (added to break the kde-build-meta.bst bootstrap circularity, see below)
# are the same upstream projects that kde-build-meta.bst also reaches via
# its own nested copies — BuildStream treats a project loaded from
# different junction paths as ambiguous unless told they're duplicates.
junctions:
  duplicates:
    buildstream-plugins:
      - plugins/buildstream-plugins.bst
      - kde-build-meta.bst:plugins/buildstream-plugins.bst
    buildstream-plugins-community:
      - plugins/buildstream-plugins-community.bst
      - kde-build-meta.bst:plugins/buildstream-plugins-community.bst

plugins:
- origin: junction
  # Standalone (not nested inside kde-build-meta.bst): kde-build-meta.bst's
  # own source is kind: git_repo, itself provided by the community plugins
  # below. Nesting this junction reference through kde-build-meta.bst would
  # require resolving kde-build-meta.bst to get the plugin that resolving
  # kde-build-meta.bst needs — a bootstrap circularity that surfaced as
  # "Subproject has no ref for junction: kde-build-meta.bst".
  junction: plugins/buildstream-plugins.bst
  elements:
    - autotools
    - meson
    - cmake
    - make
  sources:
    - patch
    - git

- origin: junction
  junction: plugins/buildstream-plugins-community.bst
  elements:
    - collect_integration
    - ostree
  sources:
    - git_repo
    - git_module
    - cargo2
